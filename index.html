<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;600&family=MuseoModerno:wght@400&display=swap" rel="stylesheet">
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #191919;
  font-family: 'MuseoModerno', cursive;
}
.calc {
  background: #191919;
  border-radius: 20px;
  border: 1px solid #2e2e2e;
  padding: 14px;
  width: 280px;
  box-shadow: 0 10px 48px rgba(0,0,0,0.8);
}
.screen {
  background: #111;
  border: 1px solid #2e2e2e;
  border-radius: 12px;
  padding: 8px 14px 6px;
  margin-bottom: 12px;
  height: 80px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
#expr {
  font-size: 11px;
  color: #555;
  font-family: 'Dosis', sans-serif;
  text-align: right;
  background: transparent;
  border: none;
  outline: none;
  pointer-events: none;
  width: 100%;
  white-space: nowrap;
  overflow: hidden;
}
#display {
  font-size: 38px;
  font-weight: 600;
  color: #e3e3e3;
  font-family: 'Dosis', sans-serif;
  text-align: right;
  background: transparent;
  border: none;
  outline: none;
  width: 100%;
}
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
button {
  font-family: 'MuseoModerno', cursive;
  border: none;
  border-radius: 10px;
  height: 56px;
  width: 100%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: filter 0.12s, transform 0.08s;
}
button:focus  { outline: none; }
button:hover  { filter: brightness(1.3); }
button:active { transform: scale(0.91); }

.num { background: #252525; color: #e3e3e3; }
.op  { background: #2d2d2d; color: #e1b024; }
.fn  { background: #2d2d2d; color: #888; font-size: 15px; }
.ac  { background: #c0392b; color: #fff; font-size: 16px; }
.del { background: #2d2d2d; color: #c0392b; }
.eq  { background: #e1b024; color: #191919; font-size: 22px; }

.span2 { grid-column: span 2; }
  </style>
</head>
<body>
<div class="calc">
  <div class="screen">
    <input id="expr" readonly>
    <input id="display" readonly placeholder="0">
  </div>
  <div class="grid">
    <button class="ac"  id="btn-ac">AC</button>
    <button class="del" id="btn-del">⌫</button>
    <button class="fn"  data-action="pct">%</button>
    <button class="op"  data-action="op">÷</button>

    <button class="num" data-action="digit">7</button>
    <button class="num" data-action="digit">8</button>
    <button class="num" data-action="digit">9</button>
    <button class="op"  data-action="op">×</button>

    <button class="num" data-action="digit">4</button>
    <button class="num" data-action="digit">5</button>
    <button class="num" data-action="digit">6</button>
    <button class="op"  data-action="op">−</button>

    <button class="num" data-action="digit">1</button>
    <button class="num" data-action="digit">2</button>
    <button class="num" data-action="digit">3</button>
    <button class="op"  data-action="op">+</button>

    <button class="num span2" data-action="digit">0</button>
    <button class="num"       data-action="dot">.</button>
    <button class="eq"        data-action="eq">=</button>
  </div>
</div>
<script>
var disp    = document.getElementById("display");
var exprEl  = document.getElementById("expr");
var exprStr = "";

function safeEval(s) {
  s = s.replace(/×/g,"*").replace(/÷/g,"/").replace(/−/g,"-");
  return eval(s);
}
function setDisplay(v) {
  var r = parseFloat(v);
  if (!isNaN(r)) v = parseFloat(r.toPrecision(12));
  exprStr = String(v);
  disp.value = exprStr;
}

document.getElementById("btn-ac").addEventListener("click", function(){
  exprStr=""; disp.value=""; exprEl.value=""; disp.placeholder="0";
});
document.getElementById("btn-del").addEventListener("click", function(){
  exprStr=exprStr.slice(0,-1); disp.value=exprStr||"";
});

document.querySelectorAll("button[data-action]").forEach(function(btn){
  btn.addEventListener("click", function(){
    var a=btn.dataset.action, t=btn.textContent.trim();
    if      (a==="digit") { exprStr+=t; disp.value=exprStr; }
    else if (a==="op")    { exprStr+=t; disp.value=exprStr; }
    else if (a==="dot")   {
      var parts=exprStr.split(/[\+\-\×\÷\*\/]/);
      if(!parts[parts.length-1].includes(".")){ exprStr+="."; disp.value=exprStr; }
    }
    else if (a==="pct")   { try{ setDisplay(safeEval(exprStr)/100); }catch(e){} }
    else if (a==="eq")    { doEquals(); }
  });
});

function doEquals(){
  try {
    exprEl.value=disp.value+" =";
    setDisplay(safeEval(exprStr));
  } catch(e){ disp.value="Error"; exprStr=""; }
}

document.addEventListener("keydown", function(e){
  var k=e.key;
  if("0123456789".includes(k))   { exprStr+=k; disp.value=exprStr; }
  else if(k===".") { exprStr+=k; disp.value=exprStr; }
  else if("+-*/".includes(k))    { exprStr+=k; disp.value=exprStr; }
  else if(k==="Enter"||k==="=")  { doEquals(); }
  else if(k==="Backspace")       { exprStr=exprStr.slice(0,-1); disp.value=exprStr; }
  else if(k==="Escape")          { exprStr=""; disp.value=""; exprEl.value=""; }
});
</script>
</body>
</html>
